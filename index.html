<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>推しビジュ6選</title>
  <meta name="description" content="6つのテーマで推しの好きなビジュを選んで、タグ画っぽい1枚を作れるメーカーです。" />
  <meta property="og:title" content="推しビジュ6選" />
  <meta property="og:description" content="6つのテーマで選ぶだけ。推しの好きなビジュを、可愛く1枚に。" />
  <meta property="og:type" content="website" />
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --main: #ff77ad;
      --main-dark: #e84d8d;
      --pink-soft: #fff1f7;
      --lavender: #f1e9ff;
      --cream: #fff9ec;
      --ink: #35252f;
      --soft: #927f88;
      --line: rgba(255, 119, 173, 0.18);
      --shadow: 0 18px 48px rgba(216, 78, 136, 0.16);
      --hand-font: "Chalkboard SE", "Marker Felt", "Bradley Hand", "Segoe Print", "Comic Sans MS", "Hiragino Maru Gothic ProN", "Yu Gothic", cursive, sans-serif;
      --ui-font: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--ui-font);
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 0%, rgba(255, 196, 221, 0.72) 0, transparent 32%),
        radial-gradient(circle at 86% 8%, rgba(241, 233, 255, 0.9) 0, transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(255, 249, 236, 1) 0, transparent 34%),
        linear-gradient(180deg, #fff7fb 0%, #ffffff 46%, #fff2f8 100%);
      overflow-x: hidden;
    }
    button, input, select { font-family: inherit; }
    img { display: block; max-width: 100%; }
    .page { width: min(100%, 1040px); margin: 0 auto; padding: 24px 14px 48px; }

    /* ヘッダー */
    .hero {
      position: relative;
      overflow: hidden;
      padding: 28px 18px 22px;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 28px;
      background:
        radial-gradient(circle at 10% 10%, rgba(255, 184, 215, 0.55), transparent 30%),
        radial-gradient(circle at 92% 0%, rgba(239, 226, 255, 0.85), transparent 32%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(255, 246, 251, 0.88));
      box-shadow: var(--shadow);
    }
    .hero::before, .hero::after {
      content: "♡";
      position: absolute;
      font-family: var(--hand-font);
      color: rgba(255, 119, 173, 0.28);
      pointer-events: none;
    }
    .hero::before { right: 20px; top: 12px; font-size: 38px; transform: rotate(12deg); }
    .hero::after { left: 18px; bottom: 8px; font-size: 26px; transform: rotate(-10deg); }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 12px; border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line); color: var(--main-dark);
      font-size: 12px; font-weight: 800; letter-spacing: 0.08em;
    }
    .hero h1 { margin: 14px 0 8px; font-size: clamp(34px, 11vw, 64px); line-height: 0.95; letter-spacing: -0.06em; color: var(--ink); }
    .hero h1 span { display: inline-block; color: var(--main-dark); }
    .hero-copy { margin: 0; color: var(--soft); font-size: 14px; line-height: 1.85; font-weight: 700; }
    .hero-note { display: inline-block; margin-top: 2px; color: var(--main-dark); font-size: 12px; line-height: 1.6; }
    .member-panel { margin-top: 18px; display: grid; gap: 8px; }
    .control-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    @media (max-width: 560px) { .control-grid { grid-template-columns: 1fr; } }
    .member-panel label { font-size: 12px; font-weight: 900; color: var(--main-dark); letter-spacing: 0.08em; }
    .select-wrap { position: relative; }
    .select-wrap::after { content: "⌄"; position: absolute; right: 17px; top: 50%; transform: translateY(-58%); color: var(--main-dark); font-size: 22px; pointer-events: none; }
    .member-select {
      width: 100%; appearance: none;
      padding: 15px 44px 15px 16px;
      border-radius: 18px; border: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff, #fff7fb);
      color: var(--ink); font-size: 15px; font-weight: 900;
      box-shadow: 0 10px 26px rgba(216, 78, 136, 0.10);
    }

    .app-grid { display: grid; gap: 18px; margin-top: 18px; }
    .section-title { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin: 26px 0 12px; }
    .section-title h2 { margin: 0; font-size: 18px; letter-spacing: -0.03em; }
    .section-title p { margin: 0; color: var(--soft); font-size: 12px; font-weight: 700; line-height: 1.5; text-align: right; }

    /* テーマカード */
    .theme-list { display: grid; gap: 14px; }
    .theme-card {
      padding: 14px; border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.76);
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,247,251,.90));
      box-shadow: 0 12px 34px rgba(216, 78, 136, 0.11);
    }
    .theme-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .theme-number {
      width: 34px; height: 34px; display: grid; place-items: center;
      border-radius: 999px; background: linear-gradient(135deg, var(--main), #ffc1da);
      color: #fff; font-size: 13px; font-weight: 900;
      box-shadow: 0 8px 18px rgba(232, 77, 141, 0.22);
    }
    .theme-title { margin: 0; font-size: 17px; font-weight: 900; letter-spacing: -0.03em; }
    .selected-preview {
      display: grid; grid-template-columns: 74px 1fr; gap: 12px; align-items: center;
      margin-bottom: 12px; padding: 10px; border-radius: 18px;
      background: rgba(255,255,255,.64); border: 1px dashed rgba(255,119,173,.25);
    }
    .selected-thumb {
      width: 74px; height: 74px; border-radius: 16px; overflow: hidden;
      background: radial-gradient(circle at 30% 20%, rgba(255,119,173,.20), transparent 30%), linear-gradient(135deg, #fff, #fff0f6);
      display: grid; place-items: center; color: var(--main-dark);
      font-size: 11px; font-weight: 900; text-align: center; line-height: 1.35;
    }
    .selected-thumb img { width: 100%; height: 100%; object-fit: cover; object-position: center top; transform-origin: center center; }
    .selected-text strong { display: block; font-size: 13px; margin-bottom: 5px; }
    .selected-text span { display: block; color: var(--soft); font-size: 12px; font-weight: 700; line-height: 1.55; }
    .photo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; margin-bottom: 12px; max-height: 198px; overflow: auto; padding: 2px 2px 6px; }
    .photo-option { position: relative; padding: 0; border: 0; border-radius: 13px; overflow: hidden; background: #fff; aspect-ratio: 1/1; cursor: pointer; box-shadow: 0 4px 12px rgba(45,36,44,.10); }
    .photo-option img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    .photo-option.is-selected { outline: 3px solid var(--main); outline-offset: 2px; }
    .photo-option.is-selected::after { content: "✓"; position: absolute; right: 4px; top: 4px; width: 18px; height: 18px; display: grid; place-items: center; border-radius: 999px; background: var(--main); color: #fff; font-size: 12px; font-weight: 900; }
    .upload-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .upload-label, .clear-btn, .save-btn { border: 0; border-radius: 999px; cursor: pointer; font-weight: 900; letter-spacing: -0.02em; }
    .upload-label { display: inline-flex; align-items: center; justify-content: center; padding: 11px 14px; background: #fff; color: var(--main-dark); border: 1px solid var(--line); box-shadow: 0 8px 18px rgba(216,78,136,.10); font-size: 13px; }
    .upload-label input { display: none; }
    .clear-btn { padding: 11px 12px; background: rgba(255,255,255,.56); color: var(--soft); font-size: 12px; border: 1px solid rgba(146,127,136,.15); }
    .position-slider-wrap { display: none; width: 100%; margin-top: 8px; padding: 10px 14px; border-radius: 16px; background: rgba(255,255,255,.72); border: 1px solid var(--line); }
    .position-slider-wrap.is-visible { display: grid; gap: 10px; }
    .position-slider-wrap label { display: flex; align-items: center; justify-content: space-between; font-size: 11px; font-weight: 900; color: var(--main-dark); margin-bottom: 6px; }
    .position-slider-wrap input[type=range] { width: 100%; accent-color: var(--main); cursor: pointer; }

    /* プレビュー */
    .preview-sticky { margin-top: 22px; }
    .preview-panel { padding: 16px; border-radius: 28px; background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,247,251,.92)); border: 1px solid rgba(255,255,255,.78); box-shadow: var(--shadow); }
    .preview-panel h2 { margin: 0 0 4px; font-size: 18px; letter-spacing: -0.04em; }
    .preview-panel p { margin: 0 0 14px; color: var(--soft); font-size: 12px; font-weight: 700; line-height: 1.65; }

    /* 完成画像本体：タグ画っぽさの調整は主にここ */
    .result-card {
      --result-main: #ff77ad;
      --result-main-dark: #e84d8d;
      --result-label: #ff5f9e;
      --result-ink: #3a2531;
      --result-soft: rgba(53,37,47,.66);
      position: relative; width: min(100%, 760px); aspect-ratio: 1/1; margin: 0 auto; overflow: hidden;
      border-radius: 26px;
      background: radial-gradient(circle at 12% 4%, rgba(255,188,216,.95), transparent 30%), radial-gradient(circle at 88% 0%, rgba(239,226,255,.95), transparent 32%), linear-gradient(180deg, #fffafd 0%, #fff1f7 58%, #fff8ef 100%);
      box-shadow: 0 18px 48px rgba(216,78,136,.16);
      padding: 32px 14px 16px;
    }
    .result-card.bg-strawberry {
      --result-main: #ff77ad;
      --result-main-dark: #e84d8d;
      --result-label: #ff5f9e;
      --result-ink: #3a2531;
      --result-soft: rgba(53,37,47,.66);
      background: radial-gradient(circle at 12% 4%, rgba(255,188,216,.95), transparent 30%), radial-gradient(circle at 88% 0%, rgba(239,226,255,.95), transparent 32%), linear-gradient(180deg, #fffafd 0%, #fff1f7 58%, #fff8ef 100%);
    }
    .result-card.bg-soda {
      --result-main: #84c7f2;
      --result-main-dark: #5aa8dc;
      --result-label: #5faee5;
      --result-ink: #27344f;
      --result-soft: rgba(39,52,79,.62);
      background: radial-gradient(circle at 10% 2%, rgba(199,237,255,.96), transparent 30%), radial-gradient(circle at 88% 4%, rgba(233,224,255,.88), transparent 32%), linear-gradient(180deg, #fbfeff 0%, #eef8ff 56%, #fff7fb 100%);
    }
    .result-card.bg-night {
      --result-main: #ff86c4;
      --result-main-dark: #ff9bd2;
      --result-label: #ff97cf;
      --result-ink: #ffffff;
      --result-soft: rgba(255,255,255,.72);
      background: radial-gradient(circle at 10% 2%, rgba(255,121,190,.50), transparent 30%), radial-gradient(circle at 88% 0%, rgba(117,98,218,.64), transparent 32%), linear-gradient(180deg, #171225 0%, #29214a 55%, #5c3f76 100%);
    }
    .result-card.bg-classic {
      --result-main: #b87566;
      --result-main-dark: #9e5e51;
      --result-label: #9e5e51;
      --result-ink: #46322d;
      --result-soft: rgba(70,50,45,.62);
      background: radial-gradient(circle at 12% 4%, rgba(244,214,196,.95), transparent 30%), radial-gradient(circle at 88% 0%, rgba(255,246,228,.92), transparent 32%), linear-gradient(180deg, #fffaf3 0%, #f5e8dc 58%, #fff7ee 100%);
    }
    .result-card.exporting { box-shadow: none !important; }
    .result-card::before { content: ""; position: absolute; inset: 0; pointer-events: none; background: radial-gradient(circle at 50% 42%, rgba(255,255,255,.10), transparent 34%), linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,187,217,.08)); z-index: 5; }
    .result-header { position: relative; z-index: 8; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
    .result-kicker-image { display: block; width: auto; height: 16px; margin-bottom: 4px; transform: rotate(-5deg); opacity: .95; }
    /* capture fix: export uses the same layout as preview */
    .result-title { margin: 4px 0 0; font-size: clamp(26px, 8vw, 48px); line-height: .9; letter-spacing: -0.07em; color: var(--result-ink); text-shadow: 0 2px 0 rgba(255,255,255,.9); }
    /* capture fix: export uses the same layout as preview */
    .result-member { flex: 0 0 auto; align-self: flex-start; margin-top: 4px; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,.68); color: var(--result-main-dark); border: 1px solid rgba(255,119,173,.18); font-size: 11px; font-weight: 900; letter-spacing: .08em; }
    /* capture fix: export uses the same layout as preview */
    .collage-grid { position: relative; z-index: 4; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); gap: 0; height: 66%; margin: 0 0 12px; border-radius: 22px; overflow: hidden; }
    /* capture fix: export uses the same layout as preview */
    .collage-item { position: relative; min-width: 0; overflow: hidden; border-radius: 20px; background: linear-gradient(135deg, rgba(255,255,255,.86), rgba(255,241,247,.88)); box-shadow: 0 10px 26px rgba(63,40,52,.12), inset 0 0 0 2px rgba(255,255,255,.72); }
    /* capture fix: export uses the same layout as preview */
    .collage-item:nth-child(1) { transform: none; z-index: 2; }
    .collage-item:nth-child(2) { transform: none; z-index: 2; }
    .collage-item:nth-child(3) { transform: none; z-index: 2; }
    .collage-item:nth-child(4) { transform: none; z-index: 2; }
    .collage-item:nth-child(5) { transform: none; z-index: 2; }
    .collage-item:nth-child(6) { transform: none; z-index: 2; }
    .result-card.exporting .collage-item:nth-child(2) { transform: none; }
    .result-card.exporting .collage-item:nth-child(3) { transform: none; }
    .result-card.exporting .collage-item:nth-child(4) { transform: none; }
    .result-card.exporting .collage-item:nth-child(5) { transform: none; }
    .result-card.exporting .collage-item:nth-child(6) { transform: none; }
    .collage-item img, .collage-placeholder { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    .collage-item img { transform-origin: center center; }
    .collage-item img { transform-origin: center center; }
    .collage-placeholder { display: grid; place-items: center; padding: 12px; color: rgba(232,77,141,.65); text-align: center; font-size: 12px; font-weight: 900; line-height: 1.45; }
    /* capture fix: export uses the same layout as preview */
    .collage-item::before { content: ""; position: absolute; inset: -2px; pointer-events: none; background: radial-gradient(circle at 50% 50%, transparent 58%, rgba(255,255,255,.30) 100%), linear-gradient(135deg, rgba(255,255,255,.04), rgba(255,152,196,.08)); z-index: 2; }
    .hand-label-image { position: absolute; z-index: 6; display: block; height: auto; }

    /* 文字が大きすぎて下が切れないように、かなり小さく調整 */
    .label-numa { left: 4.8%; top: 50.5%; width: 14%; transform: rotate(-6deg); }
    .label-best { left: 40.8%; top: 50%; width: 17%; transform: rotate(3deg); }
    .label-cute { right: 7.3%; top: 50.5%; width: 13%; transform: rotate(-4deg); }

    /* 下段はさらに上へ移動して、カード下で切れないようにする */
    .label-cool { left: 7.0%; top: 79%; width: 13%; transform: rotate(4deg); }
    .label-danger { left: 41.0%; top: 78%; width: 18%; transform: rotate(-3deg); }
    .label-legend { right: 7.7%; top: 78%; width: 13%; transform: rotate(3deg); }
    .result-card.exporting .label-numa, .result-card.exporting .label-best, .result-card.exporting .label-cute, .result-card.exporting .label-cool, .result-card.exporting .label-danger, .result-card.exporting .label-legend { filter: none; }
    .doodle-image { position: absolute; z-index: 7; display: block; opacity: .45; pointer-events: none; }
    .doodle.one { left: 5%; top: 18%; width: 26px; transform: rotate(-14deg); }
    /* capture fix: export uses the same layout as preview */
    .selected-by { position: relative; z-index: 8; display: flex; justify-content: flex-end; color: var(--result-soft); font-size: 11px; font-weight: 900; letter-spacing: .08em; text-transform: lowercase; }
    /* capture fix: export uses the same layout as preview */
    .save-actions { display: grid; gap: 9px; margin-top: 14px; }
    .save-btn { width: 100%; padding: 15px 18px; background: linear-gradient(135deg, var(--main), #ff9fc6); color: #fff; font-size: 15px; box-shadow: 0 12px 28px rgba(232,77,141,.25); }
    .note { margin: 0; color: var(--soft); font-size: 11px; line-height: 1.6; text-align: center; font-weight: 700; }
    .status { min-height: 1.4em; margin-top: 8px; color: var(--main-dark); font-size: 12px; font-weight: 900; text-align: center; }
    /* 保存時はhtml2canvasが苦手なブレンド・疑似要素を止める。レイアウトサイズは変えない */
    .result-card.exporting { box-shadow: none !important; }
    .result-card.exporting::before,
    .result-card.exporting .collage-item::before {
      display: none !important;
      content: none !important;
      background: none !important;
      mix-blend-mode: normal !important;
    }
    .result-card.exporting * {
      filter: none !important;
      mix-blend-mode: normal !important;
    }




    /* 候補写真モーダル（5選UIの挙動を移植） */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(53, 37, 47, 0.48);
      display: none;
      align-items: flex-end;
      z-index: 1000;
    }
    .modal.active { display: flex; }
    .modal-inner {
      width: 100%;
      max-height: 88vh;
      overflow: auto;
      background:
        radial-gradient(circle at 14% 0%, #ffe1ef 0, transparent 26%),
        #fff;
      border-radius: 28px 28px 0 0;
      padding: 20px 16px 28px;
      box-shadow: 0 -18px 48px rgba(53, 37, 47, 0.18);
    }
    .modal-content { max-width: 720px; margin: 0 auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
    .modal-title { font-size: 20px; font-weight: 900; letter-spacing: -0.03em; }
    .close-button {
      border: none;
      background: #fff0f7;
      color: var(--main-dark);
      border-radius: 999px;
      width: 38px;
      height: 38px;
      font-size: 22px;
      line-height: 1;
      font-weight: 900;
      cursor: pointer;
    }
    .modal .photo-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
      max-height: none;
      overflow: visible;
      margin-bottom: 16px;
      padding: 2px 2px 8px;
    }
    .theme-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .small-button {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--main-dark);
      padding: 10px 13px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(216, 78, 136, 0.10);
    }
    .small-button.primary { border: none; background: var(--ink); color: #fff; }
    input[type="file"] { display: none; }
    .modal-note { margin: 0; color: var(--soft); font-size: 11px; line-height: 1.7; font-weight: 700; text-align: center; }

    @media (min-width: 900px) {
      .page { padding: 34px 24px 64px; }
      .hero { padding: 36px 34px 30px; }
      .app-grid { grid-template-columns: minmax(0, 1fr) 420px; align-items: start; gap: 24px; }
      .preview-sticky { position: sticky; top: 24px; margin-top: 26px; }
      .photo-grid { grid-template-columns: repeat(8, 1fr); max-height: 210px; }
    }
    @media (max-width: 520px) {
      .page { padding-inline: 10px; }
      .hero { padding: 24px 15px 20px; }
      .theme-card { padding: 12px; border-radius: 22px; }
      .photo-grid { grid-template-columns: repeat(5, 1fr); gap: 6px; }
      .result-card { padding: 24px 8px 10px; border-radius: 22px; }
      .result-header { margin-bottom: 14px; }
      .result-title { font-size: 31px; }
      .result-member { padding: 7px 9px; font-size: 9px; }
      .collage-grid { height: 66%; }
      .result-kicker-image { height: 14px; }
      .hand-label-image { height: auto; }
      .label-numa { width: 14%; }
      .label-best { width: 17%; }
      .label-cute { width: 13%; }
      .label-cool { width: 13%; }
      .label-danger { width: 18%; }
      .label-legend { width: 13%; }
      .selected-by { font-size: 9px; }
      .doodle.one { width: 22px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>推しビジュ<span>6選</span></h1>
      <p class="hero-copy">6つのテーマでお気に入りの写真を選んでね。<br><span class="hero-note">※アップロードする際は、画像の権利に注意！（写真集ソロショットはNGです）</span></p>
      <div class="member-panel">
        <div class="control-grid">
          <div>
            <label for="memberSelect">MEMBERを選ぶ</label>
            <div class="select-wrap"><select id="memberSelect" class="member-select" aria-label="メンバーを選ぶ"></select></div>
          </div>
          <div>
            <label for="bgThemeSelect">背景テーマを選ぶ</label>
            <div class="select-wrap"><select id="bgThemeSelect" class="member-select" aria-label="背景テーマを選ぶ"></select></div>
          </div>
          <div>
            <label for="userNameInput">あなたの名前</label>
            <input id="userNameInput" class="member-select" type="text" placeholder="muze" maxlength="20" autocomplete="off" style="padding:15px 16px;">
          </div>
        </div>
      </div>
    </header>
    <div class="app-grid">
      <section>
        <div class="section-title"><h2>テーマごとに写真を選ぶ</h2><p>候補から選ぶか、<br>自分の画像も追加OK</p></div>
        <div id="themeList" class="theme-list"></div>
      </section>
      <aside class="preview-sticky">
        <div class="preview-panel">
          <h2>完成プレビュー</h2>
          <div id="resultCard" class="result-card bg-strawberry">
            <div class="result-header">
              <div class="result-title-wrap"><img id="resultKickerImage" class="result-kicker-image" alt="my favorite"><h2 id="resultTitle" class="result-title">KAIRYU<br>VISUAL</h2></div>
            </div>
            <div id="collageGrid" class="collage-grid"></div>
            <img id="labelNuma" class="hand-label-image label-numa" alt="沼落ちビジュ">
            <img id="labelBest" class="hand-label-image label-best" alt="今の最愛ビジュ">
            <img id="labelCute" class="hand-label-image label-cute" alt="かわいい">
            <img id="labelCool" class="hand-label-image label-cool" alt="かっこいい">
            <img id="labelDanger" class="hand-label-image label-danger" alt="ずるい">
            <img id="labelLegend" class="hand-label-image label-legend" alt="殿堂入り">
            <img id="doodleHeartImage" class="doodle-image one" alt="♡">
            <div id="selectedBy" class="selected-by">selected by muze</div>
          </div>
          <div class="save-actions"><button id="saveBtn" class="save-btn" type="button">画像を保存する</button><div id="status" class="status" aria-live="polite"></div></div>
        </div>
      </aside>
    </div>
  </main>

  <div id="photoModal" class="modal">
    <div class="modal-inner">
      <div class="modal-content">
        <div class="modal-header">
          <div id="modalTitle" class="modal-title">写真を選ぶ</div>
          <button class="close-button" type="button" aria-label="閉じる">×</button>
        </div>
        <div id="modalPhotoGrid" class="photo-grid"></div>
        <button id="modalUploadBtn" class="small-button" type="button">画像をアップロード</button>
        <p class="modal-note">候補にない写真は、自分の画像をアップロードできます。</p>
      </div>
    </div>
  </div>

  <input id="uploadInput" type="file" accept="image/*">


  <script>
    const members = [
      { id: "kairyu", name: "KAIRYU" },
      { id: "naoya", name: "NAOYA" },
      { id: "ran", name: "RAN" },
      { id: "seito", name: "SEITO" },
      { id: "ryuki", name: "RYUKI" },
      { id: "takuto", name: "TAKUTO" },
      { id: "hayato", name: "HAYATO" },
      { id: "eiki", name: "EIKI" }
    ];

    const themes = [
      { id: "numa", label: "沼落ちビジュ" },
      { id: "best", label: "今の最愛ビジュ" },
      { id: "cute", label: "かわいい" },
      { id: "cool", label: "かっこいい" },
      { id: "danger", label: "ずるい" },
      { id: "legend", label: "殿堂入り" }
    ];

    const backgroundThemes = [
      { id: "strawberry", label: "ベリー" },
      { id: "soda", label: "ソーダ" },
      { id: "classic", label: "クラシカル" }
    ];

    const IMAGE_COUNT = 20;
    const IMAGE_ORDER_DESCENDING = true;

    let currentMemberId = "kairyu";
    let currentBgThemeId = "strawberry";
    let currentThemeId = null;
    let selectedImages = createEmptySelection();

    const memberSelect = document.getElementById("memberSelect");
    const bgThemeSelect = document.getElementById("bgThemeSelect");
    const themeList = document.getElementById("themeList");
    const collageGrid = document.getElementById("collageGrid");
    const resultTitle = document.getElementById("resultTitle");
    const selectedByEl = document.getElementById("selectedBy");
    const resultCard = document.getElementById("resultCard");
    const resultKickerImage = document.getElementById("resultKickerImage");
    const doodleHeartImage = document.getElementById("doodleHeartImage");
    const saveBtn = document.getElementById("saveBtn");
    const statusEl = document.getElementById("status");
    const photoModal = document.getElementById("photoModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalPhotoGrid = document.getElementById("modalPhotoGrid");
    const uploadInput = document.getElementById("uploadInput");
    const modalUploadBtn = document.getElementById("modalUploadBtn");
    const closeButton = document.querySelector(".close-button");

    const labelImageMap = {
      numa: document.getElementById("labelNuma"),
      best: document.getElementById("labelBest"),
      cute: document.getElementById("labelCute"),
      cool: document.getElementById("labelCool"),
      danger: document.getElementById("labelDanger"),
      legend: document.getElementById("labelLegend")
    };

    init();

    function init() {
      renderMemberSelect();
      renderBackgroundThemeSelect();
      renderThemeCards();
      updateResult();
      renderHandwrittenAssets();

      memberSelect.addEventListener("change", (event) => {
        currentMemberId = event.target.value;
        currentThemeId = null;
        selectedImages = createEmptySelection();
        renderThemeCards();
        updateResult();
      });

      bgThemeSelect.addEventListener("change", (event) => {
        currentBgThemeId = event.target.value;
        updateBackgroundTheme();
      });

      document.getElementById("userNameInput").addEventListener("input", updateResult);
      saveBtn.addEventListener("click", saveResultImage);
      modalUploadBtn.addEventListener("click", triggerUpload);
      uploadInput.addEventListener("change", handleUploadFromInput);
      closeButton.addEventListener("click", closeModal);

      photoModal.addEventListener("click", (event) => {
        if (event.target === photoModal) closeModal();
      });
    }

    function createEmptySelection() {
      const empty = {};
      themes.forEach((theme) => empty[theme.id] = null);
      return empty;
    }

    function getCurrentMember() {
      return members.find((m) => m.id === currentMemberId) || members[0];
    }

    function renderMemberSelect() {
      memberSelect.innerHTML = members.map((m) => `<option value="${m.id}">${m.name}</option>`).join("");
      memberSelect.value = currentMemberId;
    }

    function renderBackgroundThemeSelect() {
      bgThemeSelect.innerHTML = backgroundThemes.map((theme) => `<option value="${theme.id}">${theme.label}</option>`).join("");
      bgThemeSelect.value = currentBgThemeId;
      updateBackgroundTheme();
    }

    function updateBackgroundTheme() {
      backgroundThemes.forEach((theme) => resultCard.classList.remove(`bg-${theme.id}`));
      resultCard.classList.add(`bg-${currentBgThemeId}`);
      renderHandwrittenAssets();
    }

    function renderHandwrittenAssets() {
      const base = "assets/handwrite/white";
      resultKickerImage.src = `${base}/my-favorite.png`;
      doodleHeartImage.src = `${base}/heart.png`;

      const assetMap = {
        numa: "numa.png",
        best: "current-best.png",
        cute: "cute.png",
        cool: "cool.png",
        danger: "zurui.png",
        legend: "legend.png"
      };

      Object.entries(assetMap).forEach(([themeId, filename]) => {
        const el = labelImageMap[themeId];
        if (el) el.src = `${base}/${filename}`;
      });
    }

    function getImageAdjustStyle(selected) {
      if (!selected || selected.type !== "upload") return "";
      const posX = selected.posX !== undefined ? selected.posX : 50;
      const posY = selected.posY !== undefined ? selected.posY : 20;
      const scale = selected.scale !== undefined ? selected.scale : 100;
      return `object-position: ${posX}% ${posY}%; transform: scale(${scale / 100});`;
    }

    function renderSelectedThumbHtml(theme, selected) {
      if (!selected) return `未選択<br>${theme.label}`;
      const style = getImageAdjustStyle(selected);
      return `<img src="${selected.src}" alt="${theme.label} 選択中"${style ? ` style="${style}"` : ""}>`;
    }

    function updateSelectedThumb(themeId) {
      const theme = themes.find((item) => item.id === themeId);
      const thumb = document.querySelector(`[data-selected-thumb="${themeId}"]`);
      if (!theme || !thumb) return;
      thumb.innerHTML = renderSelectedThumbHtml(theme, selectedImages[themeId]);
    }

    function renderThemeCards() {
      themeList.innerHTML = "";

      themes.forEach((theme, index) => {
        const selected = selectedImages[theme.id];
        const card = document.createElement("article");
        card.className = "theme-card";
        card.dataset.themeId = theme.id;

        card.innerHTML = `
          <div class="theme-head"><div class="theme-number">${index + 1}</div><h3 class="theme-title">${theme.label}</h3></div>
          <div class="selected-preview">
            <div class="selected-thumb" data-selected-thumb="${theme.id}">${renderSelectedThumbHtml(theme, selected)}</div>
            <div class="selected-text"><strong>${selected ? "選択中" : "まだ選ばれていません"}</strong><span>候補から選ぶか、自分の画像をアップロードできます。</span></div>
          </div>
          <div class="theme-actions">
            <button class="small-button primary" type="button" data-open-modal="${theme.id}">候補から選ぶ</button>
            <button class="small-button" type="button" data-open-upload="${theme.id}">画像をアップロード</button>
            <button class="clear-btn" type="button" data-clear="${theme.id}">リセット</button>
          </div>
          <div class="position-slider-wrap${selected && selected.type === "upload" ? " is-visible" : ""}" data-slider-wrap="${theme.id}">
            <div>
              <label>左右位置を調整 <span data-slider-x-val="${theme.id}">${selected && selected.posX !== undefined ? selected.posX : 50}%</span></label>
              <input type="range" min="0" max="100" value="${selected && selected.posX !== undefined ? selected.posX : 50}" data-slider-x="${theme.id}">
            </div>
            <div>
              <label>上下位置を調整 <span data-slider-y-val="${theme.id}">${selected && selected.posY !== undefined ? selected.posY : 20}%</span></label>
              <input type="range" min="0" max="100" value="${selected && selected.posY !== undefined ? selected.posY : 20}" data-slider-y="${theme.id}">
            </div>
            <div>
              <label>拡大・縮小 <span data-slider-scale-val="${theme.id}">${selected && selected.scale !== undefined ? selected.scale : 100}%</span></label>
              <input type="range" min="80" max="180" value="${selected && selected.scale !== undefined ? selected.scale : 100}" data-slider-scale="${theme.id}">
            </div>
          </div>`;

        themeList.appendChild(card);

        card.querySelector(`[data-open-modal="${theme.id}"]`).addEventListener("click", () => openModal(theme.id));
        card.querySelector(`[data-open-upload="${theme.id}"]`).addEventListener("click", () => openUploadForTheme(theme.id));
        card.querySelector(`[data-clear="${theme.id}"]`).addEventListener("click", () => {
          selectedImages[theme.id] = null;
          renderThemeCards();
          updateResult();
        });

        setupAdjustSliders(card, theme.id);
      });
    }

    function setupAdjustSliders(card, themeId) {
      const sliderXEl = card.querySelector(`[data-slider-x="${themeId}"]`);
      const sliderYEl = card.querySelector(`[data-slider-y="${themeId}"]`);
      const sliderScaleEl = card.querySelector(`[data-slider-scale="${themeId}"]`);

      if (sliderXEl) {
        sliderXEl.addEventListener("input", () => {
          const val = Number(sliderXEl.value);
          const valLabel = card.querySelector(`[data-slider-x-val="${themeId}"]`);
          if (valLabel) valLabel.textContent = val + "%";
          if (selectedImages[themeId]) {
            selectedImages[themeId].posX = val;
            updateSelectedThumb(themeId);
            updateResult();
          }
        });
      }

      if (sliderYEl) {
        sliderYEl.addEventListener("input", () => {
          const val = Number(sliderYEl.value);
          const valLabel = card.querySelector(`[data-slider-y-val="${themeId}"]`);
          if (valLabel) valLabel.textContent = val + "%";
          if (selectedImages[themeId]) {
            selectedImages[themeId].posY = val;
            updateSelectedThumb(themeId);
            updateResult();
          }
        });
      }

      if (sliderScaleEl) {
        sliderScaleEl.addEventListener("input", () => {
          const val = Number(sliderScaleEl.value);
          const valLabel = card.querySelector(`[data-slider-scale-val="${themeId}"]`);
          if (valLabel) valLabel.textContent = val + "%";
          if (selectedImages[themeId]) {
            selectedImages[themeId].scale = val;
            updateSelectedThumb(themeId);
            updateResult();
          }
        });
      }
    }

    function openModal(themeId) {
      currentThemeId = themeId;
      const theme = themes.find((item) => item.id === themeId);
      modalTitle.textContent = `${theme.label}を選ぶ`;
      renderModalPhotoGrid();
      photoModal.classList.add("active");
    }

    function closeModal() {
      photoModal.classList.remove("active");
    }

    function renderModalPhotoGrid() {
      if (!currentThemeId) return;
      modalPhotoGrid.innerHTML = "";
      const selected = selectedImages[currentThemeId];
      const numbers = Array.from({ length: IMAGE_COUNT }, (_, index) => String(index + 1).padStart(2, "0"));
      if (IMAGE_ORDER_DESCENDING) numbers.reverse();

      numbers.forEach((number) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "photo-option";

        const img = document.createElement("img");
        img.src = `images/${currentMemberId}/${number}.jpg`;
        img.alt = `${getCurrentMember().name} ${number}`;
        img.loading = "lazy";

        img.onerror = () => {
          if (!img.dataset.fallbackTried) {
            img.dataset.fallbackTried = "true";
            img.src = `images/${currentMemberId}/${number}.png`;
          } else {
            button.style.display = "none";
          }
        };

        if (selected && selected.src.includes(`/images/${currentMemberId}/${number}.`)) {
          button.classList.add("is-selected");
        }

        button.appendChild(img);
        button.addEventListener("click", () => {
          selectedImages[currentThemeId] = {
            src: img.currentSrc || img.src,
            type: "preset"
          };
          renderThemeCards();
          updateResult();
          closeModal();
        });

        modalPhotoGrid.appendChild(button);
      });
    }

    function openUploadForTheme(themeId) {
      currentThemeId = themeId;
      uploadInput.click();
    }

    function triggerUpload() {
      uploadInput.click();
    }

    function handleUploadFromInput(event) {
      const file = event.target.files && event.target.files[0];
      if (!file || !currentThemeId) return;

      if (!file.type.startsWith("image/")) {
        setStatus("画像ファイルを選んでください。");
        uploadInput.value = "";
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        selectedImages[currentThemeId] = {
          src: reader.result,
          type: "upload",
          posX: 50,
          posY: 20,
          scale: 100
        };
        renderThemeCards();
        updateResult();
        closeModal();
        uploadInput.value = "";
      };
      reader.readAsDataURL(file);
    }

    function updateResult() {
      const member = getCurrentMember();
      const userName = document.getElementById("userNameInput").value.trim() || "muze";
      resultTitle.innerHTML = `${member.name}<br>VISUAL`;
      selectedByEl.textContent = `selected by ${userName}`;
      collageGrid.innerHTML = "";

      themes.forEach((theme) => {
        const item = document.createElement("div");
        item.className = `collage-item item-${theme.id}`;
        const selected = selectedImages[theme.id];

        if (selected && selected.src) {
          const img = document.createElement("img");
          img.src = selected.src;
          img.alt = theme.label;
          if (selected.type === "upload") img.style.cssText += getImageAdjustStyle(selected);
          item.appendChild(img);
        } else {
          const placeholder = document.createElement("div");
          placeholder.className = "collage-placeholder";
          placeholder.innerHTML = `${theme.label}<br>未選択`;
          item.appendChild(placeholder);
        }

        collageGrid.appendChild(item);
      });
    }

    function canvasToBlob(canvas) {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else reject(new Error("Blob creation failed"));
        }, "image/png");
      });
    }

    function loadCanvasImage(src) {
      return new Promise((resolve) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => resolve(null);
        image.src = src;
      });
    }

    function roundedRectPath(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + width - r, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + r);
      ctx.lineTo(x + width, y + height - r);
      ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
      ctx.lineTo(x + r, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawCoverImage(ctx, image, x, y, width, height, selected) {
      if (!image) {
        ctx.save();
        roundedRectPath(ctx, x, y, width, height, 22);
        ctx.clip();
        const emptyGradient = ctx.createLinearGradient(x, y, x + width, y + height);
        emptyGradient.addColorStop(0, "#fff0f7");
        emptyGradient.addColorStop(1, "#fffaf0");
        ctx.fillStyle = emptyGradient;
        ctx.fillRect(x, y, width, height);
        ctx.restore();
        return;
      }

      const posX = selected && selected.type === "upload" && selected.posX !== undefined ? selected.posX : 50;
      const posY = selected && selected.type === "upload" && selected.posY !== undefined ? selected.posY : 0;
      const scale = selected && selected.type === "upload" && selected.scale !== undefined ? selected.scale / 100 : 1;
      const baseScale = Math.max(width / image.naturalWidth, height / image.naturalHeight) * scale;
      const drawW = image.naturalWidth * baseScale;
      const drawH = image.naturalHeight * baseScale;
      const dx = x + (width - drawW) * (posX / 100);
      const dy = y + (height - drawH) * (posY / 100);

      ctx.save();
      roundedRectPath(ctx, x, y, width, height, 22);
      ctx.clip();
      ctx.drawImage(image, dx, dy, drawW, drawH);
      ctx.restore();

      // うっすら白いベール。CSSの疑似要素より軽い処理で再現。
      ctx.save();
      roundedRectPath(ctx, x, y, width, height, 22);
      ctx.clip();
      ctx.fillStyle = "rgba(255,255,255,0.10)";
      ctx.fillRect(x, y, width, height);
      ctx.restore();
    }

    function drawRotatedImage(ctx, image, x, y, width, rotationDeg) {
      if (!image) return;
      const height = width * (image.naturalHeight / image.naturalWidth);
      ctx.save();
      ctx.translate(x + width / 2, y + height / 2);
      ctx.rotate(rotationDeg * Math.PI / 180);
      ctx.drawImage(image, -width / 2, -height / 2, width, height);
      ctx.restore();
    }

    async function createManualResultCanvas() {
      const member = getCurrentMember();
      const userName = (document.getElementById("userNameInput").value.trim()) || "muze";
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const W = 1200;
      const H = 1200;
      canvas.width = W;
      canvas.height = H;

      // 背景テーマ。保存はCanvasで直接描くので、html2canvasの停止問題を回避できる。
      const bg = ctx.createLinearGradient(0, 0, 0, H);
      if (currentBgThemeId === "soda") {
        bg.addColorStop(0, "#fbfeff");
        bg.addColorStop(0.56, "#eef8ff");
        bg.addColorStop(1, "#fff7fb");
      } else if (currentBgThemeId === "classic") {
        bg.addColorStop(0, "#fffaf3");
        bg.addColorStop(0.58, "#f5e8dc");
        bg.addColorStop(1, "#fff7ee");
      } else {
        bg.addColorStop(0, "#fffafd");
        bg.addColorStop(0.58, "#fff1f7");
        bg.addColorStop(1, "#fff8ef");
      }
      ctx.fillStyle = bg;
      roundedRectPath(ctx, 0, 0, W, H, 34);
      ctx.fill();

      // ふわっとした背景の光
      const r1 = ctx.createRadialGradient(130, 70, 0, 130, 70, 420);
      r1.addColorStop(0, currentBgThemeId === "soda" ? "rgba(199,237,255,.95)" : currentBgThemeId === "classic" ? "rgba(244,214,196,.95)" : "rgba(255,188,216,.95)");
      r1.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = r1;
      ctx.fillRect(0, 0, W, H);

      const r2 = ctx.createRadialGradient(1020, 45, 0, 1020, 45, 420);
      r2.addColorStop(0, currentBgThemeId === "classic" ? "rgba(255,246,228,.92)" : "rgba(239,226,255,.90)");
      r2.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = r2;
      ctx.fillRect(0, 0, W, H);

      // 素材読み込み
      const handBase = "assets/handwrite/white";
      const [kicker, heart, numa, best, cute, cool, danger, legend] = await Promise.all([
        loadCanvasImage(`${handBase}/my-favorite.png`),
        loadCanvasImage(`${handBase}/heart.png`),
        loadCanvasImage(`${handBase}/numa.png`),
        loadCanvasImage(`${handBase}/current-best.png`),
        loadCanvasImage(`${handBase}/cute.png`),
        loadCanvasImage(`${handBase}/cool.png`),
        loadCanvasImage(`${handBase}/zurui.png`),
        loadCanvasImage(`${handBase}/legend.png`)
      ]);

      if (kicker) drawRotatedImage(ctx, kicker, 28, 58, 118, -5);

      // タイトル
      ctx.save();
      ctx.fillStyle = currentBgThemeId === "night" ? "#ffffff" : currentBgThemeId === "soda" ? "#27344f" : currentBgThemeId === "classic" ? "#46322d" : "#3a2531";
      ctx.shadowColor = "rgba(255,255,255,.92)";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 3;
      ctx.font = "900 76px system-ui, -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif";
      ctx.textBaseline = "top";
      ctx.fillText(member.name, 26, 118);
      ctx.fillText("VISUAL", 26, 188);
      ctx.restore();

      // 画像グリッド
      const gridX = 26;
      const gridY = 350;
      const gridW = 1148;
      const gridH = 640;
      const itemW = gridW / 3;
      const itemH = gridH / 2;
      const imagePromises = themes.map((theme) => {
        const selected = selectedImages[theme.id];
        return selected && selected.src ? loadCanvasImage(selected.src) : Promise.resolve(null);
      });
      const loadedImages = await Promise.all(imagePromises);

      themes.forEach((theme, index) => {
        const col = index % 3;
        const row = Math.floor(index / 3);
        const x = gridX + col * itemW;
        const y = gridY + row * itemH;
        const selected = selectedImages[theme.id];

        ctx.save();
        ctx.fillStyle = "rgba(255,255,255,.76)";
        roundedRectPath(ctx, x, y, itemW, itemH, 22);
        ctx.fill();
        ctx.restore();

        drawCoverImage(ctx, loadedImages[index], x, y, itemW, itemH, selected);
      });

      // 手書きラベル。CSSの%位置に合わせて固定値化。
      drawRotatedImage(ctx, numa, 0.048 * W, gridY + itemH - 28, 0.14 * W, -6);
      drawRotatedImage(ctx, best, 0.408 * W, gridY + itemH - 34, 0.17 * W, 3);
      drawRotatedImage(ctx, cute, W - 0.073 * W - 0.13 * W, gridY + itemH - 28, 0.13 * W, -4);
      drawRotatedImage(ctx, cool, 0.070 * W, gridY + gridH - 42, 0.13 * W, 4);
      drawRotatedImage(ctx, danger, 0.410 * W, gridY + gridH - 48, 0.18 * W, -3);
      drawRotatedImage(ctx, legend, W - 0.077 * W - 0.13 * W, gridY + gridH - 42, 0.13 * W, 3);
      if (heart) {
        ctx.globalAlpha = 0.45;
        drawRotatedImage(ctx, heart, 60, 270, 44, -14);
        ctx.globalAlpha = 1;
      }

      // selected by
      ctx.save();
      ctx.fillStyle = currentBgThemeId === "night" ? "rgba(255,255,255,.72)" : currentBgThemeId === "soda" ? "rgba(39,52,79,.62)" : currentBgThemeId === "classic" ? "rgba(70,50,45,.62)" : "rgba(53,37,47,.66)";
      ctx.font = "900 18px system-ui, -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif";
      ctx.textAlign = "right";
      ctx.textBaseline = "top";
      ctx.fillText(`selected by ${userName}`.toLowerCase(), 1148, 1024);
      ctx.restore();

      return canvas;
    }

    async function saveResultImage() {
      const member = getCurrentMember();
      const originalText = saveBtn.textContent;
      const fileName = `oshi-visual-6-${member.id}.png`;

      saveBtn.disabled = true;
      saveBtn.textContent = "画像を作成中...";
      setStatus("画像を作成中...");

      try {
        const canvas = await createManualResultCanvas();
        const blob = await canvasToBlob(canvas);
        const file = new File([blob], fileName, { type: "image/png" });

        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({
              title: "推しビジュ6選",
              text: "推しビジュ6選を作ったよ",
              files: [file]
            });
            setStatus("共有シートを開きました。");
            return;
          } catch (shareError) {
            if (shareError && shareError.name === "AbortError") {
              setStatus("共有をキャンセルしました。");
              return;
            }
          }
        }

        downloadCanvas(canvas, fileName);
        setStatus("画像を保存しました。");
      } catch (error) {
        console.error(error);
        setStatus("画像の作成に失敗しました。ブラウザで開き直して再試行してください。");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = originalText;
      }
    }

    function downloadCanvas(canvas, fileName) {
      const link = document.createElement("a");
      link.download = fileName;
      link.href = canvas.toDataURL("image/png");
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    function setStatus(message) {
      statusEl.textContent = message;
      if (!message) return;
      window.clearTimeout(setStatus.timer);
      setStatus.timer = window.setTimeout(() => statusEl.textContent = "", 3500);
    }

    function wait(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }
  </script>
</body>
</html>
